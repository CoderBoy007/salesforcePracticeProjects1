<template>
    <lightning-card title="Get Contact Details">
        <lightning-input type="number" label="Number of Contacts to retrieve" onchange={numberOfContactHandler}></lightning-input>
        <lightning-button label="Get Contact" onclick={getContactsHandler}></lightning-button>
        <ul>
            <template lwc:if={contactsReceived}>
                <template for:each={contacts} for:item="contact">
                    <li key={contact.id}>
                        <div class="slds-p-around_medium lgc-bgc">
                            <lightning-tile label={contact.LastName}>
                                <p class="slds-truncate" title={contact.Phone}>{contact.Phone}</p>
                            </lightning-tile>
                        </div>
                    </li>
                </template>
            </template>
        </ul>
    </lightning-card>
</template>
