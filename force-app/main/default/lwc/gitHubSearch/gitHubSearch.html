<template>
    <lightning-card title="Search GitHub User" icon-name="custom:custom15">
        <div class="slds-p-around_medium">
            <lightning-input label="GitHub Username" value={userName}
                onchange={handleUserNameChange} placeholder="Enter github username...">
            </lightning-input>
            <lightning-button label="Search" variant="brand" onclick={handleSearch} class="slds-m-top_small">                
            </lightning-button>
        </div>
    </lightning-card>
</template>
