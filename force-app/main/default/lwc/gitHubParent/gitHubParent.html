<template>
    <lightning-card title="GitHub Explorer Dashboard" icon-name="standard:dashboard">
        <div class="slds-grid slds-wrap slds-gutters slds-p-around_medium">           
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                <c-git-hub-search onsearchusername={performApiCall}></c-git-hub-search>
            </div>         
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <c-git-hub-details user={userData}></c-git-hub-details>
            </div>           
            <template lwc:if={errorMessage}>
                <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_error">
                        <h2>{errorMessage}</h2>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
